short_bio_text_justify: false
short_bio: >-
  <p>
    I am a Postdoctoral Researcher in the Department of Computer Science at <a href="https://www.cuhk.edu.hk/english/" target="_blank">The Chinese University of Hong Kong</a>, supervised by Professor <a href="https://www.cse.cuhk.edu.hk/~byu/" target="_blank">Bei Yu</a>.
  </p>
  <p>
    Prior to this, I was a Postdoctoral Researcher at the Department of Computer Science, <a href="https://www.cityu.edu.hk/" target="_blank">City University of Hong Kong</a>, supervised by Professor <a href="https://www.cs.cityu.edu.hk/~nanguan/" target="_blank">Nan Guan</a>. I received my Ph.D. degree from the School of Computer Science and Technology, <a href="https://en.hit.edu.cn/" target="_blank">Harbin Institute of Technology</a>, under the supervision of Professor <a href="https://mypage.zjnu.edu.cn/gh/zh_CN/index/285516/list/index.htm" target="_blank">Hong Gao</a>. During 2022&ndash;2023, I was a visiting student at the <a href="https://www.nus.edu.sg/" target="_blank">National University of Singapore</a>, where I worked with Professor <a href="https://www.comp.nus.edu.sg/~chanmc/" target="_blank">Mun Choon Chan</a>. My research focuses on <strong>LLM4EDA</strong> (Large Language Models for Electronic Design Automation) and <strong>IoT system design</strong>.
  </p>

